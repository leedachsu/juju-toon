<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUJUTOON</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  max-width:480px;
  margin:auto;
}

/* 헤더 */
header {
  background:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #ddd;
}

.logo { color:#ff4da6; font-weight:bold; }

/* 메뉴 */
.menu {
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:white;
}

.menu span {
  cursor:pointer;
  color:gray;
}

.active {
  color:#ff4da6;
  font-weight:bold;
}

/* 페이지 */
.page { display:none; }
.page.active { display:block; }

/* 🎬 배너 */
.banner {
  position:relative;
  overflow:hidden;
  padding:10px;
}

.slides {
  display:flex;
  transition:0.5s;
}

.slide {
  min-width:100%;
}

.slide img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:15px;
}

/* ● 점 */
.dots {
  text-align:center;
  margin-top:5px;
}

.dot {
  display:inline-block;
  width:8px;
  height:8px;
  background:#ccc;
  border-radius:50%;
  margin:3px;
}

.dot.active {
  background:#ff4da6;
}

/* 카드 */
.container {
  padding:10px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
}

.info { padding:8px; }

.small { font-size:12px; color:gray; }

/* 요일 */
.days {
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">JUJUTOON</div>
  <div>🔍 👤</div>
</header>

<div class="menu">
  <span class="tab active" data-page="home">홈</span>
  <span class="tab" data-page="series">연재</span>
  <span class="tab" data-page="ranking">랭킹</span>
</div>

<!-- ✅ 홈 -->
<div class="page active" id="home">

  <!-- 🎬 배너 -->
  <div class="banner">
    <div class="slides" id="slides">

      <div class="slide">
        <img src="https://via.placeholder.com/400x200"> <!-- (닥수가수정) -->
      </div>

      <div class="slide">
        <img src="https://via.placeholder.com/400x200"> <!-- (닥수가수정) -->
      </div>

      <div class="slide">
        <img src="https://via.placeholder.com/400x200"> <!-- (닥수가수정) -->
      </div>

    </div>

    <!-- ● 점 -->
    <div class="dots" id="dots"></div>
  </div>

</div>

<!-- 연재 -->
<div class="page" id="series">
  <div class="days">
    <span data-day="월">월</span>
    <span data-day="화">화</span>
    <span data-day="수" class="active">수</span>
    <span data-day="목">목</span>
    <span data-day="금">금</span>
  </div>

  <div class="container">
    <div class="card" data-day="월">
      <img src="https://via.placeholder.com/300"> <!-- (닥수가수정) -->
      <div class="info">웹툰1</div>
    </div>
    <div class="card" data-day="화">
      <img src="https://via.placeholder.com/300">
      <div class="info">웹툰2</div>
    </div>
    <div class="card" data-day="수">
      <img src="https://via.placeholder.com/300">
      <div class="info">웹툰3</div>
    </div>
  </div>
</div>

<!-- 랭킹 -->
<div class="page" id="ranking">
  <div style="padding:20px;">🏆 랭킹 준비중</div>
</div>

<script>

// 탭
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(tab.dataset.page).classList.add("active");
  }
});

// 🎬 슬라이드
let index=0;
const slides=document.getElementById("slides");
const total=document.querySelectorAll(".slide").length;
const dotsContainer=document.getElementById("dots");

// 점 생성
for(let i=0;i<total;i++){
  let dot=document.createElement("span");
  dot.classList.add("dot");
  if(i===0) dot.classList.add("active");
  dotsContainer.appendChild(dot);
}

const dots=document.querySelectorAll(".dot");

// 자동 슬라이드
function showSlide(i){
  slides.style.transform=`translateX(-${i*100}%)`;
  dots.forEach(d=>d.classList.remove("active"));
  dots[i].classList.add("active");
}

setInterval(()=>{
  index=(index+1)%total;
  showSlide(index);
},3000);

// 👉 스와이프 기능
let startX=0;

slides.addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
});

slides.addEventListener("touchend",(e)=>{
  let endX=e.changedTouches[0].clientX;

  if(startX-endX>50){
    index=(index+1)%total;
  }else if(endX-startX>50){
    index=(index-1+total)%total;
  }

  showSlide(index);
});

</script>

</body>
</html>
